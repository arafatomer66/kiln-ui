name: 🐛 Bug report
description: Something isn't working as documented.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What did you expect, and what happened instead?
      placeholder: When I click X, I expected Y but got Z.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or a StackBlitz/CodeSandbox link.
      placeholder: |
        1. Render `<kn-button variant="solid">`
        2. Click it
        3. ...
    validations:
      required: true
  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: "20.3.0"
    validations:
      required: true
  - type: input
    id: kiln-version
    attributes:
      label: '@kiln/ui version'
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Browser, OS, screenshots — anything that helps.
