name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build library
        run: npx ng build kiln-ui
      - name: Build docs
        run: npx ng build docs --configuration production --base-href "/kiln-ui/"
